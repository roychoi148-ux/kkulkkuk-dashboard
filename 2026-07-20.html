function b2a(b){return Uint8Array.from(atob(b),c=>c.charCodeAt(0));}
async function dec(pw){
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b2a(SALT),iterations:IT,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b2a(IV)},key,b2a(CT));
  return new TextDecoder().decode(pt);
}
async function go(pw,save){
  try{
    const html=await dec(pw);
    if(save){try{sessionStorage.setItem('kkpw',pw);}catch(e){}}
    document.open();document.write(html);document.close();
  }catch(e){
    document.getElementById('er').textContent='비밀번호가 틀렸습니다.';
    try{sessionStorage.removeItem('kkpw');}catch(e){}
  }
}
document.getElementById('ok').onclick=()=>go(document.getElementById('pw').value,true);
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')go(e.target.value,true);});
(function(){try{const s=sessionStorage.getItem('kkpw');if(s)go(s,false);}catch(e){}})();
