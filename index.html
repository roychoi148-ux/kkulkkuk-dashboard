<!doctype html><html lang='ko'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1'><title>꿀꺽이 대시보드 2026-07-16</title></head><body style='margin:0;padding:14px 18px;background:#fcfcfb'>
<section id="kkdash">
<style>
#kkdash{--surface:#fcfcfb;--panel:#ffffff;--ink:#0b0b0b;--muted:#6b7280;--grid:#e9ebee;
  --up:#e5384f;--down:#2a78d6;--anom:#eb6834;--sig:#4a3aa7;--line:#c9ccd2;--sel:#eef2ff;--border:#e6e8ec;
  --buy:#1baf7a;
  color:var(--ink);font-family:'Malgun Gothic','Apple SD Gothic Neo',system-ui,sans-serif;font-size:13px;display:block}
#kkdash.dark{--surface:#14151a;--panel:#1c1e26;--ink:#f3f4f6;--muted:#9aa2b1;--grid:#2a2d38;
  --up:#ff5a6e;--down:#4f9bff;--anom:#ff8c4a;--sig:#9085e9;--line:#3a3d49;--sel:#26304d;--border:#2a2d38;--buy:#28c98d;
  background:var(--surface);border-radius:12px;padding:2px}
#kkdash *{box-sizing:border-box}
#kkdash .khead{display:flex;align-items:center;gap:12px;padding:6px 4px 6px}
#kkdash .khead b{font-size:15px}#kkdash .khead .sub{color:var(--muted);font-size:12px}
#kkdash .ktoggle{margin-left:auto;cursor:pointer;border:1px solid var(--border);background:var(--panel);
  color:var(--ink);border-radius:8px;padding:5px 11px;font-size:12px}
#kkdash .ktally{display:flex;gap:8px;padding:0 4px 10px;flex-wrap:wrap}
#kkdash .ktally span{font-size:11.5px;padding:2px 9px;border-radius:999px;font-weight:700}
#kkdash .kwrap{display:grid;grid-template-columns:minmax(450px,590px) 1fr;gap:14px;align-items:start}
@media(max-width:900px){#kkdash .kwrap{grid-template-columns:1fr}}
#kkdash .kcard{background:var(--panel);border:1px solid var(--border);border-radius:12px}
#kkdash .ktblwrap{overflow:auto;max-height:72vh}
#kkdash table{width:100%;min-width:0;border-collapse:collapse;font-size:12.5px}
#kkdash th,#kkdash td{padding:6px 7px;text-align:right;white-space:nowrap;border-bottom:1px solid var(--grid)}
#kkdash th:first-child,#kkdash td:first-child{text-align:left}
#kkdash th{position:sticky;top:0;background:var(--panel);color:var(--muted);font-weight:600;font-size:11.5px}
#kkdash tbody tr{cursor:pointer}#kkdash tbody tr:hover{background:var(--sel)}
#kkdash tbody tr.sel{background:var(--sel);outline:2px solid var(--sig);outline-offset:-2px}
#kkdash .pos{color:var(--up)}#kkdash .neg{color:var(--down)}
#kkdash .kbadge{display:inline-block;padding:1px 7px;border-radius:999px;font-size:11px;font-weight:700;
  background:color-mix(in srgb,var(--anom) 20%,transparent);color:var(--anom)}
#kkdash .bg-buy{background:color-mix(in srgb,var(--buy) 20%,transparent);color:var(--buy);padding:1px 7px;border-radius:999px;font-size:11px;font-weight:700}
#kkdash .bg-filt{background:color-mix(in srgb,var(--anom) 20%,transparent);color:var(--anom);padding:1px 7px;border-radius:999px;font-size:11px;font-weight:700}
#kkdash .bg-noent{background:color-mix(in srgb,var(--muted) 22%,transparent);color:var(--muted);padding:1px 7px;border-radius:999px;font-size:11px;font-weight:700}
#kkdash .bg-match{background:color-mix(in srgb,var(--sig) 18%,transparent);color:var(--sig);padding:1px 7px;border-radius:999px;font-size:10.5px;font-weight:700;white-space:nowrap}
#kkdash .ksec{font-size:10.5px;color:var(--muted);font-weight:400;margin-top:2px}
#kkdash .kchead{display:flex;align-items:baseline;gap:10px;padding:12px 14px 0}
#kkdash .kchead b{font-size:15px}#kkdash .kchead span{color:var(--muted);font-size:12px}
#kkdash .kleg{display:flex;flex-wrap:wrap;gap:12px;padding:8px 14px;color:var(--muted);font-size:11.5px}
#kkdash .kleg i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:-1px}
#kkdash canvas{width:100%;display:block;border-radius:0 0 12px 12px;cursor:crosshair}
#kkdash canvas.grabbing{cursor:grabbing}
#kkdash .kempty{padding:34px;text-align:center;color:var(--muted)}
#kk_tip{position:fixed;pointer-events:none;background:var(--panel);border:1px solid var(--border);
  border-radius:8px;padding:7px 9px;font-size:11.5px;box-shadow:0 4px 16px rgba(0,0,0,.15);display:none;z-index:99;color:var(--ink)}
#kk_gate{max-width:360px;margin:60px auto;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:26px;text-align:center}
#kk_gate h3{margin:0 0 6px;font-size:17px}#kk_gate p{color:var(--muted);font-size:12.5px;margin:0 0 16px}
#kk_gate input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:9px;background:var(--surface);color:var(--ink);font-size:14px}
#kk_gate button{margin-top:10px;width:100%;padding:10px;border:0;border-radius:9px;background:var(--sig);color:#fff;font-weight:700;font-size:14px;cursor:pointer}
#kk_gate .err{color:var(--up);font-size:12px;margin-top:10px;min-height:14px}
</style>
<div id='kk_gate'><h3>🔒 비밀번호가 필요합니다</h3><p>이 대시보드는 지정된 분만 볼 수 있어요.</p><input id='kk_pw' type='password' placeholder='비밀번호' autocomplete='off'><button id='kk_ok'>보기</button><div class='err' id='kk_ge'></div></div>
<div id="kk_body" style='display:none'>
<div class="khead"><b>신호 대시보드</b><span class="sub" id="kk_hd"></span>
  <button class="ktoggle" id="kk_tg">🌙 다크</button></div>
<div class="ktally" id="kk_tally"></div>
<div class="kwrap">
  <div class="kcard ktblwrap"><table><thead><tr>
    <th>종목</th><th></th><th>신호</th><th>거래량폭발</th><th>구분</th><th>수익률</th>
  </tr></thead><tbody id="kk_tb"></tbody></table></div>
  <div class="kcard">
    <div class="kchead"><b id="kk_cName">종목을 클릭하세요</b><span id="kk_cInfo"></span></div>
    <div class="kleg">
      <span><i style="background:var(--up)"></i>상승</span>
      <span><i style="background:var(--down)"></i>하락</span>
      <span><i style="background:var(--anom)"></i>비이상 거래량(평균 3배↑)</span>
      <span><i style="background:var(--sig)"></i>신호</span>
      <span>▲1차매수 ▲2차매수 ▼매도</span><span>— 거래량 평균선</span><span>🖱️ 휠:확대/축소 · 드래그:좌우이동</span>
    </div>
    <canvas id="kk_cv" height="520"></canvas>
    <div class="kempty" id="kk_emp">왼쪽 표에서 종목을 클릭하면 그날 차트가 표시됩니다.</div>
  </div>
</div>
</div>
<div id="kk_tip"></div>
<script>
window.__initKK=function(DATA){
const ROOT=document.getElementById('kkdash');
const cv=document.getElementById('kk_cv'),ctx=cv.getContext('2d'),tip=document.getElementById('kk_tip');
let cur=null,view=null,drag=null;
const BADGE={bought:['✅매수','bg-buy'],filtered:['🛡️필터탈락','bg-filt'],noentry:['⏳미진입','bg-noent']};
function cssv(n){return getComputedStyle(ROOT).getPropertyValue(n).trim();}
function fmt(n){return (n==null)?'-':n.toLocaleString();}
document.getElementById('kk_hd').textContent=DATA.date+' · 동시확정 '+DATA.rows.length+'건';
const c=DATA.counts||{};
document.getElementById('kk_tally').innerHTML=
  `<span class="bg-buy">✅매수 ${c.bought||0}</span>`+
  `<span class="bg-filt">🛡️필터탈락 ${c.filtered||0}</span>`+
  `<span class="bg-noent">⏳미진입 ${c.noentry||0}</span>`;
const tb=document.getElementById('kk_tb');
DATA.rows.forEach((r,idx)=>{const tr=document.createElement('tr');tr.dataset.idx=idx;
  const rc=r.ret==null?'':(r.ret>0?'pos':(r.ret<0?'neg':''));
  const rt=r.ret==null?'-':(r.ret>0?'+':'')+r.ret+'%';
  const bd=BADGE[r.badge]||['-',''];
  tr.innerHTML=`<td>${r.name}</td><td><span class="bg-match">🎯동시확정</span></td><td>${r.sigTime}</td><td><span class="kbadge">${r.burst}x</span></td>`+
               `<td><span class="${bd[1]}">${bd[0]}</span></td><td class="${rc}">${rt}</td>`;
  tr.onclick=()=>select(idx);tb.appendChild(tr);});
function select(idx){document.querySelectorAll('#kk_tb tr').forEach(t=>t.classList.toggle('sel',+t.dataset.idx===idx));
  cur=DATA.rows[idx];document.getElementById('kk_emp').style.display='none';
  document.getElementById('kk_cName').textContent=`${cur.name} (${cur.code})`;
  const bd=BADGE[cur.badge]||['',''];
  let info=`${DATA.date} · 신호 ${cur.sigTime} · 거래량폭발 ${cur.burst}배 · ${bd[0]} · ${cur.exit_kind} ${cur.ret>0?'+':''}${cur.ret}%`;
  document.getElementById('kk_cInfo').textContent=info;
  view={a:0,b:DATA.stocks[cur.code].candles.length-1};
  draw();}
function draw(){if(!cur||!view)return;const st=DATA.stocks[cur.code],cd=st.candles,n=cd.length;
  let a=Math.max(0,view.a),b=Math.min(n-1,view.b);if(b<a){a=0;b=n-1;}const vn=b-a+1;
  const dpr=window.devicePixelRatio||1,W=cv.clientWidth,H=520;
  cv.width=W*dpr;cv.height=H*dpr;cv.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,W,H);
  const padL=8,padR=64,padT=14,gap=16,timeH=18;
  const priceH=Math.round((H-padT-gap-timeH)*0.70),volTop=padT+priceH+gap,volH=(H-padT-gap-timeH)-priceH,plotW=W-padL-padR;
  const step=plotW/Math.max(vn,1),bw=Math.max(2,Math.min(step*0.76,18));
  let pmin=Infinity,pmax=-Infinity,vmax=0;for(let i=a;i<=b;i++){const q=cd[i];if(q[3]<pmin)pmin=q[3];if(q[2]>pmax)pmax=q[2];if(q[5]>vmax)vmax=q[5];}
  let rmax=vmax;for(let i=a;i<=b;i++)if(st.roll[i]>rmax)rmax=st.roll[i];
  const pad=(pmax-pmin)*0.08||1;pmin-=pad;pmax+=pad;
  const x=i=>padL+(i-a)*step+step/2,yP=p=>padT+(pmax-p)/(pmax-pmin)*priceH,yV=v=>volTop+volH-(v/(rmax||1))*volH;
  const UP=cssv('--up'),DOWN=cssv('--down'),ANOM=cssv('--anom'),SIG=cssv('--sig'),GRID=cssv('--grid'),MUT=cssv('--muted'),BUY=cssv('--buy');
  ctx.strokeStyle=GRID;ctx.fillStyle=MUT;ctx.lineWidth=1;ctx.font='10px sans-serif';ctx.textAlign='left';
  for(let g=0;g<=4;g++){const p=pmin+(pmax-pmin)*g/4,yy=yP(p);ctx.beginPath();ctx.moveTo(padL,yy);ctx.lineTo(padL+plotW,yy);ctx.stroke();ctx.fillText(Math.round(p).toLocaleString(),padL+plotW+4,yy+3);}
  ctx.textAlign='center';const labN=Math.min(8,vn);for(let t=0;t<labN;t++){const i=a+Math.round(t*(vn-1)/(labN-1||1));ctx.fillText(cd[i][0],x(i),H-4);}
  const anom=new Set(st.anomalies);
  for(let i=a;i<=b;i++){const q=cd[i],up=q[4]>=q[1];ctx.fillStyle=anom.has(i)?ANOM:(up?UP:DOWN);ctx.globalAlpha=anom.has(i)?0.95:0.5;
    ctx.fillRect(x(i)-bw/2,yV(q[5]),bw,Math.max(0.6,volTop+volH-yV(q[5])));}
  ctx.globalAlpha=1;ctx.fillStyle=ANOM;
  for(const i of st.anomalies){if(i<a||i>b)continue;const xx=x(i),yy=yV(cd[i][5])-4;ctx.beginPath();ctx.moveTo(xx,yy);ctx.lineTo(xx-4,yy-7);ctx.lineTo(xx+4,yy-7);ctx.closePath();ctx.fill();}
  ctx.strokeStyle=MUT;ctx.lineWidth=1.4;ctx.beginPath();let st0=false;for(let i=a;i<=b;i++){const xx=x(i),yy=yV(st.roll[i]);st0?ctx.lineTo(xx,yy):(ctx.moveTo(xx,yy),st0=true);}ctx.stroke();
  for(let i=a;i<=b;i++){const q=cd[i],up=q[4]>=q[1],col=up?UP:DOWN;ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=Math.max(1,bw*0.16);
    ctx.beginPath();ctx.moveTo(x(i),yP(q[2]));ctx.lineTo(x(i),yP(q[3]));ctx.stroke();
    const y1=yP(q[1]),y2=yP(q[4]),top=Math.min(y1,y2),h=Math.max(1,Math.abs(y2-y1));ctx.fillRect(x(i)-bw/2,top,bw,h);}
  if(cur.sigIdx>=a&&cur.sigIdx<=b){ctx.strokeStyle=SIG;ctx.lineWidth=1.3;ctx.setLineDash([4,3]);ctx.beginPath();ctx.moveTo(x(cur.sigIdx),padT);ctx.lineTo(x(cur.sigIdx),volTop+volH);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle=SIG;ctx.textAlign='center';ctx.font='bold 10px sans-serif';ctx.fillText('신호',x(cur.sigIdx),padT+9);}
  ctx.font='bold 10px sans-serif';ctx.textAlign='center';
  function buyMark(idx,price,label){if(idx==null||idx<a||idx>b)return;const xi=x(idx),yi=yP(price);ctx.fillStyle=BUY;
    ctx.beginPath();ctx.moveTo(xi,yi+2);ctx.lineTo(xi-6,yi+12);ctx.lineTo(xi+6,yi+12);ctx.closePath();ctx.fill();ctx.fillText(label,xi,yi+23);}
  buyMark(cur.buy1_i,cur.buy1_p,'1차 '+fmt(cur.buy1_p));
  buyMark(cur.buy2_i,cur.buy2_p,'2차 '+fmt(cur.buy2_p));
  if(cur.exit_i!=null&&cur.exit_i>=a&&cur.exit_i<=b){const xe=x(cur.exit_i),ye=yP(cur.exit_p);ctx.fillStyle=DOWN;
    ctx.beginPath();ctx.moveTo(xe,ye-2);ctx.lineTo(xe-6,ye-12);ctx.lineTo(xe+6,ye-12);ctx.closePath();ctx.fill();ctx.fillText('매도 '+(cur.ret>0?'+':'')+cur.ret+'%',xe,ye-15);}
  cv._geo={a,b,vn,x,padL,step,cd,volTop,volH};}
cv.onmousedown=e=>{if(!cur||!cv._geo)return;drag={x:e.clientX,a:cv._geo.a,b:cv._geo.b};cv.classList.add('grabbing');tip.style.display='none';};
window.addEventListener('mouseup',()=>{if(drag){drag=null;cv.classList.remove('grabbing');if(cur)draw();}});
cv.onmousemove=e=>{if(!cur||!cv._geo)return;const g=cv._geo,rect=cv.getBoundingClientRect();
  if(drag){const n=g.cd.length,w=drag.b-drag.a,dbars=Math.round((e.clientX-drag.x)/g.step);
    let na=drag.a-dbars;if(na<0)na=0;if(na+w>n-1)na=n-1-w;if(na<0)na=0;view={a:na,b:na+w};tip.style.display='none';draw();return;}
  let i=g.a+Math.round((e.clientX-rect.left-g.padL)/g.step-0.5);i=Math.max(g.a,Math.min(g.b,i));const q=g.cd[i];
  draw();ctx.strokeStyle=cssv('--line');ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(g.x(i),8);ctx.lineTo(g.x(i),g.volTop+g.volH);ctx.stroke();ctx.setLineDash([]);
  tip.style.display='block';tip.style.left=Math.min(e.clientX+14,window.innerWidth-160)+'px';tip.style.top=(e.clientY+14)+'px';
  const up=q[4]>=q[1];tip.innerHTML=`<b>${q[0]}</b><br>시${fmt(q[1])} 고${fmt(q[2])}<br>저${fmt(q[3])} 종${fmt(q[4])}<br>거래량 <b style="color:${up?cssv('--up'):cssv('--down')}">${fmt(q[5])}</b>`;};
cv.onwheel=e=>{if(!cur||!view||!cv._geo)return;e.preventDefault();
  const n=DATA.stocks[cur.code].candles.length,g=cv._geo,rect=cv.getBoundingClientRect();
  let center=g.a+Math.round((e.clientX-rect.left-g.padL)/g.step-0.5);center=Math.max(g.a,Math.min(g.b,center));
  const range=g.b-g.a+1,factor=e.deltaY<0?0.82:1.22;
  let nr=Math.round(range*factor);nr=Math.max(12,Math.min(n,nr));
  const lr=range>1?(center-g.a)/(range-1):0.5;
  let na=Math.round(center-nr*lr),nb=na+nr-1;
  if(na<0){na=0;nb=nr-1;}if(nb>n-1){nb=n-1;na=n-nr;}if(na<0)na=0;
  view={a:na,b:nb};draw();};
cv.onmouseleave=()=>{tip.style.display='none';if(cur)draw();};
document.getElementById('kk_tg').onclick=function(){const d=ROOT.classList.toggle('dark');this.textContent=d?'☀️ 라이트':'🌙 다크';if(cur)draw();};
if(DATA.rows.length)select(0);
window.addEventListener('resize',()=>{if(cur)draw();});
};
</script>

function b2a(b){return Uint8Array.from(atob(b),c=>c.charCodeAt(0));}
async function tryOpen(pw){
  try{
    const enc=new TextEncoder();
    const km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b2a(SALT),iterations:IT,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b2a(IV)},key,b2a(CT));
    const data=JSON.parse(new TextDecoder().decode(pt));
    document.getElementById('kk_gate').style.display='none';
    document.getElementById('kk_body').style.display='';
    window.__initKK(data);
  }catch(e){document.getElementById('kk_ge').textContent='비밀번호가 틀렸습니다.';}
}
document.getElementById('kk_ok').onclick=()=>tryOpen(document.getElementById('kk_pw').value);
