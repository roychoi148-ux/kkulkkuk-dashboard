#kkdash th:first-child,#kkdash td:first-child{text-align:left}

#kkdash .kleg i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:-1px}
#kkdash canvas{width:100%;display:block;border-radius:0 0 12px 12px}
#kkdash .kempty{padding:34px;text-align:center;color:var(--muted)}
#kk_tip{position:fixed;pointer-events:none;background:var(--panel);border:1px solid var(--border);

    ctx.beginPath();ctx.moveTo(x(i),yP(b[2]));ctx.lineTo(x(i),yP(b[3]));ctx.stroke();
    const y1=yP(b[1]),y2=yP(b[4]),top=Math.min(y1,y2),h=Math.max(1,Math.abs(y2-y1));ctx.fillRect(x(i)-bw/2,top,bw,h);}
  ctx.strokeStyle=SIG;ctx.lineWidth=1.3;ctx.setLineDash([4,3]);ctx.beginPath();ctx.moveTo(x(cur.sigIdx),padT);ctx.lineTo(x(cur.sigIdx),volTop+volH);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle=SIG;ctx.textAlign='center';ctx.font='bold 10px sans-serif';ctx.fillText('신호',x(cur.sigIdx),padT+9);
  if(cur.entryIdx!=null){const xi=x(cur.entryIdx),yi=yP(cur.entryPrice);ctx.fillStyle=UP;
    ctx.beginPath();ctx.moveTo(xi,yi+2);ctx.lineTo(xi-5,yi+11);ctx.lineTo(xi+5,yi+11);ctx.closePath();ctx.fill();
    ctx.fillText('매수 '+fmt(cur.entryPrice),xi,yi+22);}
  if(cur.exitIdx!=null){const xe=x(cur.exitIdx),ye=yP(cur.exitPrice);ctx.fillStyle=DOWN;
    ctx.beginPath();ctx.moveTo(xe,ye-2);ctx.lineTo(xe-5,ye-11);ctx.lineTo(xe+5,ye-11);ctx.closePath();ctx.fill();
    ctx.fillText('매도 '+(cur.ret>0?'+':'')+cur.ret+'%',xe,ye-14);}
  if(cur.entryIdx!=null&&cur.exitIdx!=null){ctx.strokeStyle=LINE;ctx.setLineDash([2,3]);ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x(cur.entryIdx),yP(cur.entryPrice));ctx.lineTo(x(cur.exitIdx),yP(cur.exitPrice));ctx.stroke();ctx.setLineDash([]);}
  cv._geo={n,x,padL,step,cd,volTop,volH};}
cv.onmousemove=e=>{if(!cur||!cv._geo)return;const g=cv._geo,rect=cv.getBoundingClientRect();
  let i=Math.round((e.clientX-rect.left-g.padL)/g.step-0.5);i=Math.max(0,Math.min(g.n-1,i));const b=g.cd[i];
  draw();ctx.strokeStyle=cssv('--line');ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(g.x(i),8);ctx.lineTo(g.x(i),g.volTop+g.volH);ctx.stroke();ctx.setLineDash([]);
  tip.style.display='block';tip.style.left=Math.min(e.clientX+14,window.innerWidth-160)+'px';tip.style.top=(e.clientY+14)+'px';
  const up=b[4]>=b[1];tip.innerHTML=`<b>${b[0]}</b><br>시${fmt(b[1])} 고${fmt(b[2])}<br>저${fmt(b[3])} 종${fmt(b[4])}<br>거래량 <b style="color:${up?cssv('--up'):cssv('--down')}">${fmt(b[5])}</b>`;};
cv.onmouseleave=()=>{tip.style.display='none';if(cur)draw();};
document.getElementById('kk_tg').onclick=function(){const d=ROOT.classList.toggle('dark');this.textContent=d?'☀️ 라이트':'🌙 다크';if(cur)draw();};
if(DATA.rows.length)select(0);
window.addEventListener('resize',()=>{if(cur)draw();});
})();
</script>
